<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="canvas">
        <div class="main-container">
            <div class="alert-box dispersable">
                <div class="line top-line">
                    <span class="syllable d-0">Mais</span>
                    <span class="syllable d-05">um</span>
                </div>
                <div class="line middle-line">
                    <div class="word highlight">
                        <span class="syllable d-083">ins</span>
                        <span class="syllable d-1">cri</span>
                        <span class="syllable d-15">to</span>
                    </div>
                </div>
                <div class="line bottom-line">
                    <span class="syllable d-2">no</span>
                    <div class="word">
                        <span class="syllable d-25">ca</span>
                        <span class="syllable d-283">nal</span>
                    </div>
                </div>
            </div>
            <div class="thanks-box">
                <div class="thanks-line">Obrigado</div>
                <div class="user-line">
                    @{username}!
                    <span class="badge badge-months">{tenure} meses</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
